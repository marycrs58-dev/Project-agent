                  const colorNivel={Alto:PAL.red,Medio:PAL.amber,Bajo:PAL.green}[r.nivel]||PAL.gray;
                  return(
                    <div key={r.id} style={{padding:"6px 9px",background:"rgba(255,255,255,0.8)",borderRadius:8,border:`1px solid ${colorNivel}33`,display:"flex",gap:7,alignItems:"flex-start"}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:colorNivel,flexShrink:0,marginTop:3}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:11,fontWeight:600,color:PAL.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.descripcion}</div>
                        <div style={{display:"flex",gap:5,marginTop:2,alignItems:"center"}}>
                          <span style={{fontSize:9,background:colorNivel+"22",color:colorNivel,borderRadius:4,padding:"1px 5px",fontWeight:600}}>{r.nivel}</span>
                          <span style={{fontSize:9,color:PAL.gray}}>{r.estado||"Activo"}</span>
                        </div>
                      </div>
                      {esAdmin&&<button onClick={()=>setModalRiesgo(r)} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:PAL.gray,flexShrink:0,padding:0}}>✏️</button>}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
        <div style={{height:4,background:"rgba(0,0,0,0.04)"}}>
          <div style={{width:`${progreso(proyecto)}%`,height:"100%",background:proyecto.color,transition:"width 1.2s ease"}}/>
        </div>
      </div>
      </div>

      {/* Contenido — mismo ancho que el banner */}
      <div style={{maxWidth:900,margin:"0 auto",padding:"20px 16px 40px"}}>

      {/* Pipeline */}
      <div style={{background:PAL.surface,border:`1px solid ${PAL.border}`,borderRadius:14,padding:"14px 16px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:13,fontWeight:700,color:PAL.text}}>Proceso de desarrollo — {progreso(proyecto)}% completado</span>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {esAdmin&&<Btn v="secondary" style={{fontSize:11,padding:"3px 10px"}} onClick={()=>setConfigEtapas(true)}>⚙ Editar etapas</Btn>}
            <button onClick={()=>setPipelineFullscreen(true)} title="Ver en pantalla completa"
              style={{padding:"4px 10px",borderRadius:8,border:`1px solid ${PAL.border}`,background:PAL.surface,cursor:"pointer",fontSize:13,color:PAL.gray}}>⛶ Presentar</button>
          </div>
        </div>
        <Pipeline proyecto={proyecto} onEtapaClick={esAdmin?(etapa,idx)=>setModalEtapa({etapa,idx}):null}/>
      </div>

      {/* Pipeline pantalla completa */}
      {pipelineFullscreen&&ReactDOM.createPortal(
        <FullscreenPipeline proyecto={proyecto} onClose={()=>setPipelineFullscreen(false)}/>,
        document.body
      )}

      <div style={{display:"flex",gap:0,borderBottom:`2px solid ${PAL.border}`,marginBottom:18,overflowX:"auto"}}>
        {TABS_PROY.map(t=>(<button key={t} onClick={()=>setTab(t)} style={{padding:"9px 14px",border:"none",background:"none",cursor:"pointer",fontSize:13,color:tab===t?PAL.teal:PAL.gray,fontWeight:tab===t?700:500,borderBottom:`2px solid ${tab===t?PAL.teal:"transparent"}`,marginBottom:-2,whiteSpace:"nowrap"}}>{t}</button>))}
      </div>

      {tab==="Proceso"&&(
        <div>
          <div style={{fontSize:12,color:PAL.gray,marginBottom:12}}>{esAdmin?"Haz clic en una etapa para actualizar estado, fechas, responsable y entregables.":"Vista de solo lectura."}</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {proyecto.etapas.map((etapa,i)=>{
              const done=etapa.status==="Completado";const isActual=etapa.status==="En progreso";const isRetrasado=etapa.status==="Retrasado";const entsDone=etapa.entregables.filter(e=>e.done).length;
              return(<div key={etapa.id} onClick={esAdmin?()=>setModalEtapa({etapa,idx:i}):undefined} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:done?PAL.greenLight:isActual?PAL.tealLight:isRetrasado?PAL.redLight:PAL.surface,border:`1px solid ${done?PAL.green+"44":isActual?PAL.teal+"44":isRetrasado?PAL.red+"66":PAL.border}`,borderRadius:10,cursor:esAdmin?"pointer":"default",animation:isRetrasado?"retrasado-pulse 2s ease-in-out infinite":undefined}}>
                <span style={{fontSize:18}}>{etapa.icon}</span>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:done?PAL.green:isActual?PAL.teal:isRetrasado?PAL.red:PAL.text}}>{etapa.label}</div><div style={{fontSize:11,color:PAL.gray,display:"flex",gap:8,flexWrap:"wrap",marginTop:2}}><span>{entsDone}/{etapa.entregables.length} entregables</span>{etapa.fechaInicio&&(()=>{const dc=dateColor(etapa.fechaInicio,etapa.status);return <span style={{color:dc.c,fontWeight:600,background:dc.bg,borderRadius:4,padding:"1px 6px"}}>▶ {etapa.fechaInicio}</span>;})()}{etapa.fechaFin&&(()=>{const dc=dateColor(etapa.fechaFin,etapa.status);return <span style={{color:dc.c,fontWeight:600,background:dc.bg,borderRadius:4,padding:"1px 6px"}}>⏱ {etapa.fechaFin}</span>;})()}{etapa.responsable&&<span>👤 {etapa.responsable}</span>}</div></div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><Badge label={etapa.status}/>{isActual&&<span style={{fontSize:11,background:proyecto.color+"22",color:proyecto.color,padding:"2px 8px",borderRadius:10,fontWeight:600}}>Actual</span>}{isRetrasado&&<span style={{fontSize:11,background:PAL.red+"22",color:PAL.red,padding:"2px 8px",borderRadius:10,fontWeight:700}}>⚠ Retrasada</span>}</div>
              </div>);
            })}
          </div>
        </div>
      )}
      {tab==="Gantt"&&<GanttTab proyecto={proyecto}/>}
      {tab==="Calendario"&&<CalendarioTab proyecto={proyecto}/>}
      {tab==="Tareas"&&(
        <div>
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
            <div style={{display:"flex",gap:4,flex:1,flexWrap:"wrap"}}>
              {["Todas",...ESTADOS_TAREA].map(s=>(<button key={s} onClick={()=>setFilterTarea(s)} style={{padding:"5px 11px",borderRadius:7,border:`1px solid ${filterTarea===s?PAL.teal:PAL.border}`,background:filterTarea===s?PAL.tealLight:PAL.surface,color:filterTarea===s?PAL.teal:PAL.gray,fontSize:12,cursor:"pointer",fontWeight:filterTarea===s?700:400}}>{s}</button>))}
            </div>
            {vencidas.length>0&&<Btn v="ghost" style={{fontSize:12,padding:"5px 12px"}} onClick={()=>setModalTeams(vencidas)}>🔔 Teams ({vencidas.length})</Btn>}
            {esAdmin&&<Btn onClick={()=>setModalTarea({})}>+ Tarea</Btn>}
          </div>
          {vencidas.length>0&&<div style={{background:PAL.amberLight,border:`1px solid ${PAL.amber}44`,borderRadius:10,padding:"9px 14px",marginBottom:12,fontSize:13,color:PAL.amber}}>⚠️ {vencidas.length} tarea(s) vencida(s) requieren atención</div>}
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {tareasVis.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:PAL.gray}}>No hay tareas en esta categoría</div>}
            {tareasVis.map(tarea=>{
              const vencida=tarea.status!=="Completado"&&tarea.fechaLimite&&new Date(tarea.fechaLimite)<today;
              return(<div key={tarea.id} style={{background:PAL.surface,border:`1px solid ${vencida?PAL.red+"55":PAL.border}`,borderRadius:10,padding:"10px 13px"}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                  <button onClick={()=>toggleTarea(tarea)} style={{width:22,height:22,borderRadius:"50%",border:`2px solid ${tarea.status==="Completado"?PAL.green:tarea.status==="En progreso"?PAL.teal:PAL.border}`,background:tarea.status==="Completado"?PAL.green:tarea.status==="En progreso"?PAL.tealLight:PAL.surface,cursor:"pointer",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {tarea.status==="Completado"&&<span style={{color:"#fff",fontSize:11}}>✓</span>}
                    {tarea.status==="En progreso"&&<span style={{color:PAL.teal,fontSize:10}}>▶</span>}
                  </button>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center",marginBottom:3}}>
                      <span style={{fontSize:14,fontWeight:500,color:tarea.status==="Completado"?PAL.gray:PAL.text,textDecoration:tarea.status==="Completado"?"line-through":"none"}}>{tarea.nombre}</span>
                      {vencida&&<span style={{fontSize:11,background:PAL.redLight,color:PAL.red,padding:"1px 6px",borderRadius:4,fontWeight:600}}>Vencida</span>}
                    </div>
                    <div style={{display:"flex",gap:10,fontSize:12,color:PAL.gray,flexWrap:"wrap",alignItems:"center"}}>
                      {tarea.responsable&&<span style={{display:"flex",alignItems:"center",gap:4}}><Avatar nombre={tarea.responsable} size={16}/>{tarea.responsable.split(" ")[0]}</span>}
                      {tarea.fechaLimite&&<span>📅 {tarea.fechaLimite}</span>}
                      {tarea.notas&&<span style={{fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:200}}>💬 {tarea.notas}</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                    <Badge label={tarea.prioridad}/>
                    {esAdmin&&<><button onClick={()=>setModalTarea(tarea)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,padding:"2px 3px"}}>✏️</button><button onClick={()=>setConfirmDel(tarea.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,padding:"2px 3px",color:PAL.red}}>🗑️</button></>}
                  </div>
                </div>
              </div>);
            })}
          </div>
        </div>
      )}
      {tab==="Equipo"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
            {(Array.isArray(proyecto.equipo)?proyecto.equipo:[]).map((persona,i)=>(<div key={i} style={{background:PAL.surface,border:`1px solid ${PAL.border}`,borderRadius:12,padding:16,display:"flex",gap:12,alignItems:"center"}}><Avatar nombre={persona.nombre} size={40}/><div><div style={{fontSize:14,fontWeight:600,color:PAL.text}}>{persona.nombre.split(" ")[0]}</div><div style={{fontSize:11,color:PAL.gray}}>{persona.nombre.split(" ").slice(1).join(" ")}</div><div style={{marginTop:4}}><Pill label={persona.rol} color={PAL.teal}/></div></div></div>))}
          </div>
          <div style={{marginTop:16,background:PAL.grayLight,borderRadius:10,padding:14}}><div style={{fontSize:13,fontWeight:600,color:PAL.text,marginBottom:6}}>Maquilador</div><div style={{fontSize:13,color:PAL.gray}}>🏭 <b style={{color:PAL.text}}>{proyecto.maquilador}</b> · {proyecto.pais}</div></div>
        </div>
      )}
      {tab==="Minutas"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
            <span style={{fontSize:13,color:PAL.gray}}>{proyecto.minutas.length} minuta(s)</span>
            <Btn onClick={()=>setModalMinuta(true)}>+ Nueva minuta / Teams</Btn>
          </div>
          {proyecto.minutas.length===0&&<div style={{textAlign:"center",padding:"36px 0",color:PAL.gray}}>No hay minutas registradas</div>}
          {proyecto.minutas.map(m=>(<div key={m.id} style={{background:PAL.surface,border:`1px solid ${PAL.border}`,borderRadius:12,padding:16,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:15,fontWeight:700,color:PAL.text}}>{m.titulo}</span><span style={{fontSize:12,color:PAL.gray}}>{m.fecha}</span></div>
            {m.linkTeams&&<div style={{fontSize:12,marginBottom:8}}><a href={m.linkTeams} target="_blank" rel="noreferrer" style={{color:"#5059C9",textDecoration:"none"}}>💬 Ver reunión Teams</a></div>}
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>{m.asistentes.map(a=><div key={a} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:PAL.gray}}><Avatar nombre={a} size={18}/>{a.split(" ")[0]}</div>)}</div>
            {m.acuerdos.length>0&&<div style={{marginBottom:8}}><div style={{fontSize:12,fontWeight:600,color:PAL.text,marginBottom:5}}>Acuerdos</div>{m.acuerdos.map((a,i)=><div key={i} style={{fontSize:13,color:PAL.gray,paddingLeft:10,borderLeft:`2px solid ${PAL.teal}`,marginBottom:5}}>✓ {a}</div>)}</div>}
            {m.proximos.length>0&&<div><div style={{fontSize:12,fontWeight:600,color:PAL.text,marginBottom:5}}>Próximos pasos</div>{m.proximos.map((p,i)=><div key={i} style={{fontSize:13,color:PAL.gray,paddingLeft:10,borderLeft:`2px solid ${PAL.amber}`,marginBottom:5}}>→ {p}</div>)}</div>}
          </div>))}
        </div>
      )}

      {tab==="Archivos"&&<ArchivosTab proyecto={proyecto}/>}

      {modalEtapa&&<EtapaModal etapa={modalEtapa.etapa} idx={modalEtapa.idx} proyecto={proyecto} onSave={saveEtapa} onClose={()=>setModalEtapa(null)}/>}
      {modalTarea!==null&&<TareaModal tarea={modalTarea?.id?modalTarea:null} equipo={Array.isArray(proyecto.equipo)?proyecto.equipo:[]} onSave={saveTarea} onClose={()=>setModalTarea(null)}/>}
      {modalMinuta&&<MinutaModal proyecto={proyecto} onSave={saveMinuta} onClose={()=>setModalMinuta(false)}/>}
      {modalTeams&&<TeamsModal tareas={modalTeams} onClose={()=>setModalTeams(null)}/>}
      {editProyecto&&<ProyectoModal proyecto={proyecto} equipoGlobal={Array.isArray(equipoGlobal)?equipoGlobal:EQUIPO_INICIAL} onSave={p=>{onUpdate({...proyecto,...p});setEditProyecto(false);}} onClose={()=>setEditProyecto(false)}/>}
      {configEtapas&&<EtapasConfigModal etapas={proyecto.etapas} onSave={etapas=>onUpdate({...proyecto,etapas:etapas.map(e=>({...e,entregables:e.entregables||[]}))})} onClose={()=>setConfigEtapas(false)}/>}
      {modalRiesgo!==null&&<RiesgoModal riesgo={modalRiesgo} onSave={saveRiesgo} onClose={()=>setModalRiesgo(null)}/>}
      {confirmDel&&(<Overlay onClose={()=>setConfirmDel(null)}><div style={{background:PAL.surface,borderRadius:14,padding:24,width:300,textAlign:"center"}}><div style={{fontSize:15,fontWeight:700,marginBottom:8}}>¿Eliminar tarea?</div><div style={{fontSize:13,color:PAL.gray,marginBottom:20}}>Esta acción no se puede deshacer.</div><div style={{display:"flex",gap:10}}><Btn v="secondary" style={{flex:1}} onClick={()=>setConfirmDel(null)}>Cancelar</Btn><Btn v="danger" style={{flex:1}} onClick={()=>delTarea(confirmDel)}>Eliminar</Btn></div></div></Overlay>)}
      </div>{/* fin contenido */}
    </div>
  );
}

// ─── APP PRINCIPAL ─────────────────────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(null);
  const [perfil,setPerfil]=useState(null);
  const [proyectos,setProyectos]=useState([]);
  const [equipoGlobal,setEquipoGlobal]=useState(EQUIPO_INICIAL);
  const [proyectoActivo,setProyectoActivo]=useState(null);
  const [modalNuevo,setModalNuevo]=useState(false);
  const [modalResponsables,setModalResponsables]=useState(false);
  const [modalUsuarios,setModalUsuarios]=useState(false);
  const [modalMaquiladores,setModalMaquiladores]=useState(false);
  const [modalTipos,setModalTipos]=useState(false);
  const [maquiladoresList,setMaquiladoresList]=useState(MAQUILADORES);
  const [tiposList,setTiposList]=useState(TIPOS_PROYECTO);
  const [confirmDelProy,setConfirmDelProy]=useState(null);
  const [busqueda,setBusqueda]=useState("");
  const [filtroMaq,setFiltroMaq]=useState("Todos");
  const [filtrocat,setFiltrocat]=useState("Todos");
  const [filtroTipo,setFiltroTipo]=useState("Todos");
  const [filtroDueno,setFiltroDueno]=useState("Todos");
  const [vista,setVista]=useState("grid"); // "grid" | "lista"
  const [orden,setOrden]=useState("nombre"); // "nombre" | "avance" | "lanzamiento" | "vencidas" | "reciente"
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);

  const esAdmin=perfil?.rol==="admin";

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>setSession(session));
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>setSession(session));
    return ()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!session){setLoading(false);return;}
    const cargar=async()=>{
      setLoading(true);
      const {data:p}=await sb.from("user_profiles").select("*").eq("id",session.user.id).single();
      setPerfil(p);
      const {data:proy}=await sb.from("proyectos").select("*").order("id");
      if(proy&&proy.length>0) setProyectos(proy.map(r=>r.data));
      else {
        for(const p of PROYECTOS_EJEMPLO) await sb.from("proyectos").insert({data:p});
        setProyectos(PROYECTOS_EJEMPLO);
      }
      const {data:eq}=await sb.from("equipo_global").select("*").limit(1);
      if(eq&&eq.length>0){
        const d=eq[0].data;
        // d puede ser el array del equipo directamente, o un objeto con claves
        if(Array.isArray(d)) setEquipoGlobal(d);
        else {
          // extraer equipo, maquiladores y tipos si existen
          if(d.maquiladores&&Array.isArray(d.maquiladores)){MAQUILADORES=d.maquiladores;setMaquiladoresList(d.maquiladores);}
          if(d.tiposProyecto&&Array.isArray(d.tiposProyecto)){TIPOS_PROYECTO=d.tiposProyecto;setTiposList(d.tiposProyecto);}
          // el equipo puede estar en d directamente como array de objetos con nombre/rol
          // o puede ser que d tenga una clave equipo
          if(d.equipo&&Array.isArray(d.equipo)) setEquipoGlobal(d.equipo);
          // si no hay equipo en el objeto, dejar el inicial
        }
      }
      setLoading(false);
    };
    cargar();
  },[session]);

  const saveProyecto=async(proyecto)=>{
    setSaving(true);
    const {data:all}=await sb.from("proyectos").select("id,data");
    const row=all?.find(r=>r.data.id===proyecto.id);
    if(row) await sb.from("proyectos").update({data:proyecto,updated_at:new Date()}).eq("id",row.id);
    else await sb.from("proyectos").insert({data:proyecto});
    setSaving(false);
  };

  const updateProyecto=async(up)=>{setProyectos(prev=>prev.map(p=>p.id===up.id?up:p));setProyectoActivo(up);await saveProyecto(up);};
  const crearProyecto=async(form)=>{const nuevo={...form,id:Date.now()};setProyectos(prev=>[nuevo,...prev]);await saveProyecto(nuevo);};

  const eliminarProyecto=async(id)=>{
    setSaving(true);
    const {data:all}=await sb.from("proyectos").select("id,data");
    const row=all?.find(r=>r.data.id===id);
    if(row) await sb.from("proyectos").delete().eq("id",row.id);
    setProyectos(prev=>prev.filter(p=>p.id!==id));
    setConfirmDelProy(null);setSaving(false);
  };

  const duplicarProyecto=async(proyecto)=>{
    const copia={...JSON.parse(JSON.stringify(proyecto)),id:Date.now(),nombre:proyecto.nombre+" (copia)",tareas:[],minutas:[],etapas:proyecto.etapas.map(e=>({...e,status:"Pendiente",fechaInicio:"",fechaFin:"",entregables:e.entregables.map(en=>({...en,done:false}))}))};
    setProyectos(prev=>[copia,...prev]);
    await saveProyecto(copia);
  };

  const saveMaquiladores=async(lista)=>{
    MAQUILADORES=lista;
    setMaquiladoresList(lista);
    const {data:eq}=await sb.from("equipo_global").select("id,data").limit(1);
    const newData={...(eq&&eq[0]?eq[0].data:{}),maquiladores:lista};
    if(eq&&eq.length>0) await sb.from("equipo_global").update({data:newData}).eq("id",eq[0].id);
    else await sb.from("equipo_global").insert({data:newData});
  };

  const saveTipos=async(lista)=>{
    TIPOS_PROYECTO=lista;
    setTiposList(lista);
    const {data:eq}=await sb.from("equipo_global").select("id,data").limit(1);
    const newData={...(eq&&eq[0]?eq[0].data:{}),tiposProyecto:lista};
    if(eq&&eq.length>0) await sb.from("equipo_global").update({data:newData}).eq("id",eq[0].id);
    else await sb.from("equipo_global").insert({data:newData});
  };
  const saveEquipo=async(equipo)=>{
    setEquipoGlobal(equipo);
    const {data:eq}=await sb.from("equipo_global").select("id,data").limit(1);
    const prev=eq&&eq.length>0?eq[0].data:{};
    const newData=Array.isArray(prev)?{equipo,maquiladores:MAQUILADORES,tiposProyecto:TIPOS_PROYECTO}:{...prev,equipo};
    if(eq&&eq.length>0) await sb.from("equipo_global").update({data:newData}).eq("id",eq[0].id);
    else await sb.from("equipo_global").insert({data:newData});
  };
  const logout=async()=>{await sb.auth.signOut();setSession(null);setPerfil(null);setProyectos([]);};

  if(loading) return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:PAL.bg,flexDirection:"column",gap:16}}><Spinner/><div style={{fontSize:14,color:PAL.gray}}>Cargando…</div></div>);
  if(!session) return <LoginScreen/>;

  if(proyectoActivo){
    const latest=proyectos.find(p=>p.id===proyectoActivo.id)||proyectoActivo;
    return(<div style={{background:PAL.bg,minHeight:"100vh"}}>
      {saving&&<SavingBadge/>}
      <VistaProyecto proyecto={latest} equipoGlobal={equipoGlobal} onUpdate={updateProyecto} onBack={()=>setProyectoActivo(null)} esAdmin={esAdmin}/>
    </div>);
  }

  const duenos=[...new Set(proyectos.map(p=>p.responsable).filter(Boolean))];
  const filtrados=proyectos.filter(p=>{
    const txt=busqueda.toLowerCase();
    return(!txt||p.nombre.toLowerCase().includes(txt)||p.cliente.toLowerCase().includes(txt)||p.maquilador.toLowerCase().includes(txt))
      &&(filtroMaq==="Todos"||p.maquilador===filtroMaq)
      &&(filtrocat==="Todos"||p.categoria===filtrocat)
      &&(filtroTipo==="Todos"||p.tipo===filtroTipo)
      &&(filtroDueno==="Todos"||p.responsable===filtroDueno);
  });

  const ordenados=[...filtrados].sort((a,b)=>{
    if(orden==="nombre") return a.nombre.localeCompare(b.nombre);
    if(orden==="avance") return progreso(b)-progreso(a);
    if(orden==="avance_asc") return progreso(a)-progreso(b);
    if(orden==="lanzamiento") return new Date(a.fechaLanzamiento)-new Date(b.fechaLanzamiento);
    if(orden==="vencidas"){
      const va=a.tareas.filter(t=>t.status!=="Completado"&&t.fechaLimite&&new Date(t.fechaLimite)<new Date()).length;
      const vb=b.tareas.filter(t=>t.status!=="Completado"&&t.fechaLimite&&new Date(t.fechaLimite)<new Date()).length;
      return vb-va;
    }
    if(orden==="reciente") return b.id-a.id;
    return 0;
  });

  const stats={
    total:filtrados.length,
    enProceso:filtrados.filter(p=>progreso(p)>0&&progreso(p)<100).length,
    vencidos:filtrados.reduce((a,p)=>a+p.tareas.filter(t=>t.status!=="Completado"&&t.fechaLimite&&new Date(t.fechaLimite)<new Date()).length,0),
    avg:filtrados.length?Math.round(filtrados.reduce((a,p)=>a+progreso(p),0)/filtrados.length):0,
    hayFiltro: busqueda||filtroMaq!=="Todos"||filtrocat!=="Todos"||filtroTipo!=="Todos"||filtroDueno!=="Todos"
  };

  return(
    <div style={{fontFamily:"'DM Sans','Segoe UI',system-ui,sans-serif",minHeight:"100vh",background:"#EEECEA"}}>
      {saving&&<SavingBadge/>}

      {/* Banner superior */}
      <div style={{background:`linear-gradient(135deg, #0A1628 0%, #1A3A6B 50%, #2563EB 100%)`,padding:"28px 24px 24px",marginBottom:0}}>
        <div style={{maxWidth:880,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
            <div>
              <div style={{fontSize:11,letterSpacing:"0.14em",textTransform:"uppercase",color:"rgba(255,255,255,0.7)",fontWeight:600,marginBottom:5}}>Gestión de proyectos</div>
              <div style={{fontSize:28,fontWeight:900,color:"#fff",letterSpacing:-0.5}}>Genomma Lab</div>
              <div style={{fontSize:14,color:"rgba(255,255,255,0.75)",marginTop:3}}>OTC · Cosméticos · Suerox</div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",background:"rgba(255,255,255,0.15)",borderRadius:20,fontSize:13,backdropFilter:"blur(4px)"}}>
                <Avatar nombre={perfil?.nombre||perfil?.email||"?"} size={22}/>
                <span style={{color:"#fff",fontWeight:500}}>{perfil?.nombre||perfil?.email}</span>
                <Badge label={perfil?.rol||"viewer"}/>
              </div>
              {esAdmin&&<button onClick={()=>setModalResponsables(true)} style={{padding:"6px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.3)",background:"rgba(255,255,255,0.1)",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:500}}>👥 Equipo</button>}
              {esAdmin&&<button onClick={()=>setModalMaquiladores(true)} style={{padding:"6px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.3)",background:"rgba(255,255,255,0.1)",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:500}}>🏭 Maquiladores</button>}
              {esAdmin&&<button onClick={()=>setModalTipos(true)} style={{padding:"6px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.3)",background:"rgba(255,255,255,0.1)",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:500}}>🏷️ Tipos</button>}
              {esAdmin&&<button onClick={()=>setModalUsuarios(true)} style={{padding:"6px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.3)",background:"rgba(255,255,255,0.15)",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:500}}>🔐 Usuarios</button>}
              {esAdmin&&<button onClick={()=>setModalNuevo(true)} style={{padding:"7px 16px",borderRadius:8,border:"none",background:"#fff",color:PAL.teal,cursor:"pointer",fontSize:13,fontWeight:700}}>+ Nuevo proyecto</button>}
              <button onClick={logout} style={{padding:"6px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.3)",background:"transparent",color:"rgba(255,255,255,0.8)",cursor:"pointer",fontSize:12}}>Cerrar sesión</button>
            </div>
          </div>

          {/* Métricas dentro del banner */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginTop:22}}>
            {[
              {label:stats.hayFiltro?"Filtrados":"Proyectos totales",value:stats.total,sub:stats.hayFiltro?`de ${proyectos.length} totales`:null,color:"#fff",bg:"rgba(255,255,255,0.12)"},
              {label:"En proceso",value:stats.enProceso,color:"#7EEAEA",bg:"rgba(255,255,255,0.1)"},
              {label:"Tareas vencidas",value:stats.vencidos,color:stats.vencidos>0?"#FFB3B3":"#A8EDBA",bg:"rgba(255,255,255,0.1)"},
              {label:"Avance promedio",value:`${stats.avg}%`,color:"#FFD97A",bg:"rgba(255,255,255,0.1)"},
            ].map(m=>(
              <div key={m.label} style={{background:m.bg,borderRadius:10,padding:"12px 14px",border:"1px solid rgba(255,255,255,0.15)"}}>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.65)",marginBottom:3,textTransform:"uppercase",letterSpacing:"0.04em"}}>{m.label}</div>
                <div style={{fontSize:22,fontWeight:800,color:m.color}}>{m.value}</div>
                {m.sub&&<div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginTop:2}}>{m.sub}</div>}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Contenido principal */}
      <div style={{maxWidth:880,margin:"0 auto",padding:"20px 16px 40px"}}>

      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        <input placeholder="Buscar producto, cliente o maquilador…" value={busqueda} onChange={e=>setBusqueda(e.target.value)} style={{flex:1,minWidth:180,padding:"9px 13px",borderRadius:9,border:`1px solid ${PAL.border}`,fontSize:13,outline:"none",background:PAL.surface,fontFamily:"inherit"}}/>
        <Sel value={filtroTipo} onChange={e=>setFiltroTipo(e.target.value)} style={{width:160}}>
          <option value="Todos">Todos los tipos</option>
          {tiposList.map(t=><option key={t}>{t}</option>)}
        </Sel>
        <Sel value={filtroDueno} onChange={e=>setFiltroDueno(e.target.value)} style={{width:160}}>
          <option value="Todos">Todos los dueños</option>
          {duenos.map(d=><option key={d}>{d}</option>)}
        </Sel>
        <Sel value={filtroMaq} onChange={e=>setFiltroMaq(e.target.value)} style={{width:140}}>
          <option value="Todos">Todos los maquiladores</option>
          {maquiladoresList.map(m=><option key={m.nombre}>{m.nombre}</option>)}
        </Sel>
        <Sel value={filtrocat} onChange={e=>setFiltrocat(e.target.value)} style={{width:120}}>
          <option value="Todos">OTC y Cosméticos</option>
          {CATEGORIAS.map(c=><option key={c}>{c}</option>)}
        </Sel>
      </div>

      {/* Barra de ordenamiento y vista */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <span style={{fontSize:12,color:PAL.gray,fontWeight:500}}>Ordenar por:</span>
        {[["reciente","Reciente"],["nombre","A-Z"],["avance","Mayor avance"],["avance_asc","Menor avance"],["lanzamiento","Lanzamiento"],["vencidas","Vencidas"]].map(([v,l])=>(
          <button key={v} onClick={()=>setOrden(v)}
            style={{padding:"4px 11px",borderRadius:7,border:`1px solid ${orden===v?PAL.teal:PAL.border}`,background:orden===v?PAL.tealLight:PAL.surface,color:orden===v?PAL.teal:PAL.gray,fontSize:12,cursor:"pointer",fontWeight:orden===v?700:400}}>
            {l}
          </button>
        ))}
        <div style={{marginLeft:"auto",display:"flex",gap:4}}>
          <button onClick={()=>setVista("grid")} title="Vista cuadrícula"
            style={{width:32,height:32,borderRadius:7,border:`1px solid ${vista==="grid"?PAL.teal:PAL.border}`,background:vista==="grid"?PAL.tealLight:PAL.surface,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>
            ⊞
          </button>
          <button onClick={()=>setVista("lista")} title="Vista lista"
            style={{width:32,height:32,borderRadius:7,border:`1px solid ${vista==="lista"?PAL.teal:PAL.border}`,background:vista==="lista"?PAL.tealLight:PAL.surface,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>
            ☰
          </button>
        </div>
        <span style={{fontSize:12,color:PAL.gray}}>{ordenados.length} proyecto(s)</span>
      </div>

      {/* Lista o cuadrícula */}
      {vista==="lista"?(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {ordenados.map(p=><TarjetaProyecto key={p.id} proyecto={p} onClick={()=>setProyectoActivo(p)} onDuplicate={duplicarProyecto} onDelete={id=>setConfirmDelProy(id)} esAdmin={esAdmin} modo="lista"/>)}
          {ordenados.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:PAL.gray}}>{proyectos.length===0?"Cargando proyectos…":"No se encontraron proyectos"}</div>}
        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
          {ordenados.map(p=><TarjetaProyecto key={p.id} proyecto={p} onClick={()=>setProyectoActivo(p)} onDuplicate={duplicarProyecto} onDelete={id=>setConfirmDelProy(id)} esAdmin={esAdmin} modo="grid"/>)}
          {ordenados.length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:"40px 0",color:PAL.gray}}>{proyectos.length===0?"Cargando proyectos…":"No se encontraron proyectos"}</div>}
        </div>
      )}

      {modalNuevo&&<ProyectoModal equipoGlobal={Array.isArray(equipoGlobal)?equipoGlobal:EQUIPO_INICIAL} maquiladoresProp={maquiladoresList} onSave={p=>{crearProyecto(p);setModalNuevo(false);}} onClose={()=>setModalNuevo(false)}/>}
      {modalResponsables&&<ResponsablesModal equipo={Array.isArray(equipoGlobal)?equipoGlobal:EQUIPO_INICIAL} onSave={saveEquipo} onClose={()=>setModalResponsables(false)}/>}
      {modalUsuarios&&<UsuariosModal onClose={()=>setModalUsuarios(false)}/>}
      {modalMaquiladores&&<MaquiladoresModal maquiladores={maquiladoresList} onSave={saveMaquiladores} onClose={()=>setModalMaquiladores(false)}/>}
      {modalTipos&&<TiposProyectoModal tipos={tiposList} onSave={saveTipos} onClose={()=>setModalTipos(false)}/>}
      {confirmDelProy&&(<Overlay onClose={()=>setConfirmDelProy(null)}><div style={{background:PAL.surface,borderRadius:14,padding:28,width:320,textAlign:"center"}}>
        <div style={{fontSize:28,marginBottom:8}}>🗑️</div>
        <div style={{fontSize:15,fontWeight:700,color:PAL.text,marginBottom:8}}>¿Eliminar proyecto?</div>
        <div style={{fontSize:13,color:PAL.gray,marginBottom:24}}>Se eliminarán todas las etapas, tareas y minutas. Esta acción no se puede deshacer.</div>
        <div style={{display:"flex",gap:10}}>
          <Btn v="secondary" style={{flex:1}} onClick={()=>setConfirmDelProy(null)}>Cancelar</Btn>
          <Btn v="danger" style={{flex:1}} onClick={()=>eliminarProyecto(confirmDelProy)}>Eliminar</Btn>
        </div>
      </div></Overlay>)}
      </div>{/* fin contenido principal */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
