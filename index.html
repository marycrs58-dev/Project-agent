// Exportar a Excel (CSV enriquecido)
const exportarProcesoExcel = (proyecto) => {
    const pct = progreso(proyecto);
    const rows = [
        [`PROCESO DE DESARROLLO — ${proyecto.nombre}`],
        [`Cliente: ${proyecto.cliente}`, `Maquilador: ${proyecto.maquilador}`, `País: ${proyecto.pais}`],
        [`Avance total: ${pct}%`, `Fecha inicio: ${proyecto.fechaInicio}`, `Fecha lanzamiento: ${proyecto.fechaLanzamiento}`],
        [],
        ["#", "Etapa", "Estado", "Responsable", "Fecha Inicio", "Fecha Compromiso",
            "Entregables completados", "Entregables totales", "% Entregables", "Notas"],
        ...proyecto.etapas.map((e, i) => [
            i + 1,
            `"${e.label}"`,
            e.status,
            `"${e.responsable || ""}"`,
            e.fechaInicio || "",
            e.fechaFin || "",
            e.entregables.filter(x => x.done).length,
            e.entregables.length,
            e.entregables.length > 0 ? `${Math.round(e.entregables.filter(x => x.done).length / e.entregables.length * 100)}%` : "0%",
            `"${e.notas || ""}"`
        ]),
        [],
        ["ENTREGABLES POR ETAPA"],
        ["Etapa", "Entregable", "Completado"],
        ...proyecto.etapas.flatMap(e => e.entregables.map(ent => [`"${e.label}"`, `"${ent.desc}"`, ent.done ? "Sí" : "No"])),
        [],
        ["TAREAS"],
        ["Tarea", "Responsable", "Fecha límite", "Status", "Prioridad"],
        ...proyecto.tareas.map(t => [`"${t.nombre}"`, `"${t.responsable || ""}"`, t.fechaLimite || "", t.status, t.prioridad || ""])
    ];
    const csv = rows.map(r => Array.isArray(r) ? r.join(",") : "").join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `Proceso_${proyecto.nombre.replace(/\s/g, "_")}.csv`;
    a.click();
    URL.revokeObjectURL(url);
};
